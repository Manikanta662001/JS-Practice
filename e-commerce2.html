<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Amazon</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f3f3f3;
      }

      /* HEADER */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #131921;
        color: white;
        padding: 10px 20px;
      }

      .logo {
        font-size: 22px;
        font-weight: bold;
        color: #ff9900;
        cursor: pointer;
      }

      .search-box {
        flex: 1;
        margin: 0 20px;
        display: flex;
      }

      .search-box input {
        width: 100%;
        padding: 8px;
        border: none;
        outline: none;
      }

      .search-box button {
        padding: 8px 15px;
        border: none;
        background: #febd69;
        cursor: pointer;
      }

      .cart {
        cursor: pointer;
        font-size: 16px;
      }

      .cart span {
        color: #ff9900;
        font-weight: bold;
      }

      /* PRODUCTS */
      /* PRODUCTS */
      .container {
        padding: 20px;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }

      .card {
        background: white;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.03);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
      }

      .price {
        color: green;
        font-weight: bold;
        margin: 10px 0;
      }

      button {
        padding: 8px 12px;
        border: none;
        background: #ff9900;
        cursor: pointer;
        border-radius: 4px;
      }

      button:hover {
        background: #e68a00;
      }

      /* CART */
      .cart-wrapper {
        background: white;
        margin: 20px;
        padding: 20px;
        border-radius: 8px;
      }

      .cart-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        align-items: center;
      }

      .qty-btn {
        padding: 5px 10px;
        margin: 0 5px;
      }

      .remove {
        background: red;
        color: white;
      }

      .total {
        margin-top: 15px;
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="header">
      <div class="logo" onclick="goHome()">MiniAmazon</div>

      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Search products..."
          oninput="searchProducts()"
        />
        <!-- <button onclick="searchProducts()">Search</button> -->
      </div>

      <div class="cart" onclick="goToCart()">
        🛒 Cart (<span id="cartCount">0</span>)
      </div>
    </div>

    <!-- PRODUCTS -->
    <div class="container">
      <div class="products" id="productList"></div>
    </div>
    <div class="cart-wrapper">
      <h2>Cart</h2>
      <div id="cartItems"></div>
      <div class="total" id="total"></div>
    </div>

      let cart = [];

      // Render Products
      function renderProducts(filtered = []) {
        const container = document.getElementById("productList");
        container.innerHTML = "";

        (filtered.length > 0 ? filtered : products).forEach((product) => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
        <img src="${product.image}" />
        <h4>${product.name}</h4>
        <p class="price">₹${product.price}</p>
        <button>Add to Cart</button>
      `;

          div.querySelector("button").addEventListener("click", () => {
            addToCart(product);
          });

          container.appendChild(div);
        });
      }

      // Add to Cart
      function addToCart(product) {
        const existing = cart.find((item) => item.id === product.id);

        if (existing) {
          existing.quantity++;
        } else {
          cart.push({ ...product, quantity: 1 });
        }

        renderCart();
      }

      // Render Cart
      function renderCart() {
        const container = document.getElementById("cartItems");
        const totalDiv = document.getElementById("total");
        const cartCount = document.getElementById("cartCount");

        container.innerHTML = "";

        if (cart.length === 0) {
          container.innerHTML = "<p>Cart is empty</p>";
          totalDiv.innerText = "";
          cartCount.innerText = "0";
          return;
        }

        let total = 0;

        cart.forEach((item, index) => {
          total += item.price * item.quantity;

          const div = document.createElement("div");
          div.className = "cart-item";

          div.innerHTML = `
        <span>${item.name} - ₹${item.price}</span>
        <div>
          <button class="qty-btn">-</button>
          ${item.quantity}
          <button class="qty-btn">+</button>
          <button class="remove">Remove</button>
        </div>
      `;

          const buttons = div.querySelectorAll("button");

          // Decrease
          buttons[0].addEventListener("click", () => {
            item.quantity--;
            if (item.quantity <= 0) {
              cart.splice(index, 1);
            }
            renderCart();
          });

          // Increase
          buttons[1].addEventListener("click", () => {
            item.quantity++;
            renderCart();
          });

          // Remove
          buttons[2].addEventListener("click", () => {
            cart.splice(index, 1);
            renderCart();
          });

          container.appendChild(div);
        });

        totalDiv.innerText = "Total: ₹" + total;
        cartCount.innerText = cart.length;
      }
      function searchProducts() {
        console.log("SEARCH::");
        const value = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const filtered = products.filter((p) =>
          p.name.toLowerCase().includes(value),
        );
        renderProducts(filtered);
      }

      renderProducts();
    </script>
